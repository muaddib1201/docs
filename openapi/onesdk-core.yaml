            - e_raw_mode_color_bgra
            - e_raw_mode_color_rgb
            - e_raw_mode_color_bgr
            - e_raw_mode_gray
        scale_mode:
          type: string
          enum:
            - aspect_fit
            - aspect_fill
          description: |-
            【引入版本】0.0.51。缩放模式：
            - `aspect_fit`：自适应
            - `aspect_fill`：拉伸铺满
        margin:
          $ref: "#/components/schemas/PdfPreviewMargin"
