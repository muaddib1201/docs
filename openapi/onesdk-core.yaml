openapi: 3.1.0
info:
  title: Pantum OneSDK Core API
  version: 1.0.0
  description: Minimal OpenAPI spec for the core OneSDK endpoints.
servers:
  - url: http://127.0.0.1:{port}
    description: Local OneSDK HTTP server
    variables:
      port:
        default: "18088"
        description: 端口号由 SDK 启动时动态分配并返回，每次启动可能不同。
paths:
  /:
    get:
      operationId: getServiceInfo
      summary: 查询服务信息
      description: 读取 OneSDK 服务元信息与模块状态，用于确认本地 HTTP 服务是否已经正常启动。
      parameters:
        - name: Connection
          in: header
          required: false
          description: 建议传 close，便于移动端调试时快速关闭连接。
          schema:
            type: string
            examples: 
              - close
      responses:
        "200":
          description: 服务可用时返回服务元信息与模块列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceInfoResponse"
              example:
                meta:
                  name: onesdk
                  version: 1.2.3
                  build_time: "2025-01-01T00:00:00Z"
                  git_branch: main
                  git_commit_hash: abc1234
                  git_commit_time: "2024-12-31T12:00:00Z"
                  mode: release
                  git_status_clean: true
                  system: android
                  system_version_min: "9.0"
                  architecture: arm64
                  macro: PANTUM_ONESDK_ANDROID
                modules:
                  core: []
                  devices: []
                  print: []
                  scan: []
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /devices/supported:
    get:
      operationId: getSupportedDevices
      summary: 读取支持机型
      description: 读取当前 SDK 支持的设备机型与能力信息，是设备发现和参数构造的前置接口。
      parameters:
        - name: Connection
          in: header
          required: false
          description: 建议传 close。
          schema:
            type: string
            examples: 
              - close
      responses:
        "200":
          description: 业务处理成功时返回支持机型列表以及打印、扫描、传真等能力描述。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportedDevicesResponse"
              example:
                device_info:
                  - model_name: M6600NW Series
                    usb_pid: "0x1234"
                    series_name: M6600
                print_capability:
                  - model_name: M6600NW Series
                    duplex: true
                    color_mode:
                      - mono
                scan_capability:
                  - model_name: M6600NW Series
                    source:
                      - flatbed
                    color_mode:
                      - color
                      - gray
                fax_capability: []
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /devices/supported.csv:
    get:
      operationId: getSupportedDevicesCsv
      summary: 支持设备列表（CSV）
      description: 下载当前 SDK 支持设备列表的 CSV 文件。
      parameters:
        - name: Connection
          in: header
          required: false
          description: 建议传 close。
          schema:
            type: string
            examples: 
              - close
      responses:
        "200":
          description: 成功返回 CSV 文件内容。
          content:
            text/csv:
              schema:
                type: string
                format: binary
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /devices/usb:
    get:
      operationId: getUsbDevices
      summary: USB设备列表
      description: 读取当前已识别的 USB 设备列表。
      parameters:
        - name: Connection
          in: header
          required: false
          description: 建议传 close。
          schema:
            type: string
            examples: 
              - close
      responses:
        "200":
          description: 成功返回 USB 设备列表。
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UsbDevice"
              example:
                - model_name: M6550NW Series
                  serial_number: PTM123456789
                  compression: 0
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /devices/net:
    get:
      operationId: getNetDevices
      summary: NET设备列表
      description: 读取当前局域网发现任务的状态、搜索参数和已发现的网络设备列表。
      parameters:
        - name: Accept
          in: header
          required: false
          description: 缺省默认为 `application/json`，可显式指定 `text/event-stream` 以接收流式结果。
          schema:
            type: string
            examples:
              - application/json
              - text/event-stream
        - name: Connection
          in: header
          required: false
          description: 建议传 close。
          schema:
            type: string
            examples:
              - close
      responses:
        "200":
          description: 成功返回搜索任务状态、搜索参数和当前发现到的网络设备列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetDevicesResponse"
              example:
                job_info:
                  status: completed
                  status_timestamp:
                    created: "2025-01-01T00:00:00Z"
                    processing: "2025-01-01T00:00:01Z"
                    completed: "2025-01-01T00:00:10Z"
                  result: success
                job_setting:
                  duration: 10
                  interval: 2
                devices:
                  - sdk_interface_name: wlan0
                    model_name: M6550NW Series
                    host_name: Pantum-M6550NW
                    serial_number: PTM123456789
                    ipv4: 192.168.1.20
                    ipv6: fe80::1
                    mac_address: "00:11:22:33:44:55"
                    compression: 0
                    slp_attribute_list:
                      printer_name: Pantum-M6550NW
                      x_mac_addr: "00:11:22:33:44:55"
                    bonjour_txt_record:
                      product: Pantum M6550NW Series
                      ty: Pantum-M6550NW
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
    post:
      operationId: startNetDeviceSearch
      summary: 开始 NET 设备搜索
      description: 启动局域网设备搜索任务，搜索时长和发包间隔由 `job_setting` 指定。
      parameters:
        - name: Connection
          in: header
          required: false
          description: 建议传 close。
          schema:
            type: string
            examples:
              - close
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NetSearchRequest"
            example:
              job_setting:
                duration: 10
                interval: 2
      responses:
        "200":
          description: 成功启动搜索任务。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                code: 200
                message: OK
                details: success
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /devices/net/cancel:
    post:
      operationId: cancelNetDeviceSearch
      summary: 取消 NET 设备搜索
      description: 停止当前正在执行的局域网设备搜索任务。
      parameters:
        - name: Connection
          in: header
          required: false
          description: 建议传 close。
          schema:
            type: string
            examples:
              - close
      responses:
        "200":
          description: 成功取消搜索任务。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                code: 200
                message: OK
                details: success
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /pdf/create/get:
    post:
      operationId: createPdf
      summary: 创建 PDF 文件
      description: 将一组图片（JPEG、PNG、BMP）合并为 PDF 文件，保存到指定路径。
      parameters:
        - name: Connection
          in: header
          required: true
          description: 建议传 close，便于移动端调试时快速关闭连接。
          schema:
            type: string
            examples:
              - close
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PdfCreateRequest"
            example:
              image:
                - /tmp/page1.jpeg
                - /tmp/page2.png
              resolution: 300
              pdf_path: /tmp/output.pdf
      responses:
        "200":
          description: 创建成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                code: 200
                message: OK
                details: success
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /pdf/preview:
    get:
      operationId: getPdfPreviewJobs
      summary: 预览作业列表
      description: 读取当前 SDK 中所有 PDF 预览作业的 ID 列表。
      parameters:
        - name: Connection
          in: header
          required: true
          description: 建议传 close，便于移动端调试时快速关闭连接。
          schema:
            type: string
            examples:
              - close
      responses:
        "200":
          description: 成功返回预览作业 ID 列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfPreviewJobsResponse"
              example:
                job_ids:
                  - "preview-job-001"
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
    post:
      operationId: createPdfPreviewJob
      summary: 创建预览作业
      description: |-
        打开指定 PDF 文件，创建预览作业，返回作业 ID 及文件元数据（页数、版本、创建日期等）。

        创建成功后可通过 `job_id` + `page_index` 获取各页的尺寸信息、BMP 图像或 RAW 数据。
      parameters:
        - name: Connection
          in: header
          required: true
          description: 建议传 close，便于移动端调试时快速关闭连接。
          schema:
            type: string
            examples:
              - close
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PdfPreviewJobCreateRequest"
            example:
              job_setting:
                path: /tmp/document.pdf
                password: ""
      responses:
        "200":
          description: 创建成功，返回作业 ID 及文件元数据。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfPreviewJobResponse"
              example:
                job_id: "preview-job-001"
                job_setting:
                  path: /tmp/document.pdf
                  password: ""
                file_meta:
                  page_count: 13
                  pdf_version: "1.5"
                  pdf_producer: "Adobe PDF Library 10.01"
                  content_creator: "Adobe Illustrator CS6 (Windows)"
                  creation_date: "2024-01-03T15:08:43Z"
                  modification_date: "2024-01-03T15:08:43Z"
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /pdf/preview/{job_id}/{page_index}/meta:
    get:
      operationId: getPdfPreviewPageMeta
      summary: 获取指定页元数据
      description: 获取指定预览作业中某一页的宽、高（单位：72dpi 点数）及旋转角度。
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: page_index
          in: path
          required: true
          description: 页面下标，取值范围 [1, page_count]。
          schema:
            type: string
        - name: Connection
          in: header
          required: true
          description: 建议传 close，便于移动端调试时快速关闭连接。
          schema:
            type: string
            examples:
              - close
      responses:
        "200":
          description: 成功返回页面元数据。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfPreviewPageMetaResponse"
              example:
                width: 595
                height: 842
                rotation: 0
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /pdf/preview/{job_id}/{page_index}/bmp/get:
    post:
      operationId: getPdfPreviewPageBmp
      summary: 获取指定页 BMP
      description: 将指定预览作业中某一页渲染为 BMP 图像，以二进制流返回。支持自定义输出尺寸、缩放模式和边距。
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: page_index
          in: path
          required: true
          description: 页面下标，取值范围 [1, page_count]。
          schema:
            type: string
        - name: Connection
          in: header
          required: true
          description: 建议传 close，便于移动端调试时快速关闭连接。
          schema:
            type: string
            examples:
              - close
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PdfPreviewPageBmpRequest"
            example:
              width: 595
              height: 842
              scale_mode: aspect_fit
              margin:
                top: 0
                bottom: 0
                left: 0
                right: 0
                color: "0xFFFFFF"
      responses:
        "200":
          description: 成功返回 BMP 图像二进制数据。
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /pdf/preview/{job_id}/{page_index}/raw/get:
    post:
      operationId: getPdfPreviewPageRaw
      summary: 获取指定页 RAW
      description: |-
        将指定预览作业中某一页渲染为 RAW 像素数据，以二进制流返回。支持多种像素排列模式、缩放模式和边距。

        注意：返回的 RAW 数据每行按 4 字节对齐。
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: page_index
          in: path
          required: true
          description: 页面下标，取值范围 [1, page_count]。
          schema:
            type: string
        - name: Connection
          in: header
          required: true
          description: 建议传 close，便于移动端调试时快速关闭连接。
          schema:
            type: string
            examples:
              - close
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PdfPreviewPageRawRequest"
            example:
              width: 595
              height: 842
              mode: e_raw_mode_color_argb
              scale_mode: aspect_fit
      responses:
        "200":
          description: 成功返回 RAW 像素二进制数据。
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /pdf/preview/{job_id}:
    delete:
      operationId: deletePdfPreviewJob
      summary: 删除预览作业
      description: 关闭并删除指定的 PDF 预览作业，返回该作业的设置及文件元数据。
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: Connection
          in: header
          required: true
          description: 建议传 close，便于移动端调试时快速关闭连接。
          schema:
            type: string
            examples:
              - close
      responses:
        "200":
          description: 删除成功，返回作业信息。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfPreviewJobResponse"
              example:
                job_id: "preview-job-001"
                job_setting:
                  path: /tmp/document.pdf
                  password: ""
                file_meta:
                  page_count: 13
                  pdf_version: "1.5"
                  pdf_producer: "Adobe PDF Library 10.01"
                  content_creator: "Adobe Illustrator CS6 (Windows)"
                  creation_date: "2024-01-03T15:08:43Z"
                  modification_date: "2024-01-03T15:08:43Z"
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /device/status/get:
    post:
      operationId: getDeviceStatus
      summary: 获取设备状态
      description: |-
        获取指定设备的当前状态，包括静态信息（版本号、序列号等）和动态信息（耗材、状态列表、纸盒、页数统计等）。

        此接口为阻塞式调用，成功时立即返回，否则等待超时。

        **限制：**
        - `io` 支持 IPv4、IPv6；USB 仅限 Linux、macOS、Android。
      parameters:
        - name: Connection
          in: header
          required: true
          description: 建议传 close，便于移动端调试时快速关闭连接。
          schema:
            type: string
            examples:
              - close
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceStatusRequest"
            example:
              job_target:
                model_name: "M7300FDW Series"
                io: "ipv4://192.168.1.100"
              job_setting:
                duration: 10
                interval: 2
      responses:
        "200":
          description: 成功返回设备状态。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceStatusResponse"
              example:
                result: success
                static:
                  version:
                    firmware: "1.A.0.0"
                    boot: "1.A.0.0"
                    kernel: "1.A.0.0"
                    engine: "1.A.0.0"
                  production_date: "2024-01-01"
                  memory_size: "256"
                  serial_number: "PTM123456789"
                  batch_number: "B001"
                dynamic:
                  sleep_time: 15
                  status:
                    - name: STATUS_I_PRINT_READY
                      description: 就绪
                      param: ""
                  supply:
                    cartridge:
                      k: 80
                    drum:
                      k: 90
                  media_source:
                    standard_tray: true
                    manual_tray: false
                  page_count_summary:
                    total: 1000
                    monochrome: 950
                    color: 50
                  page_count_media_size:
                    "A4 (210x297mm)": 900
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /device/status.csv:
    get:
      operationId: getDeviceStatusCsv
      summary: 设备状态列表（CSV）
      description: 下载 CSV 文件，列出各系列设备所有可能的状态宏名及参数说明，供解析 `dynamic.status[].param` 字段时参考。
      parameters:
        - name: Connection
          in: header
          required: true
          description: 建议传 close，便于移动端调试时快速关闭连接。
          schema:
            type: string
            examples:
              - close
      responses:
        "200":
          description: 成功返回 CSV 文件内容。
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /device/slp/get:
    post:
      operationId: getDeviceSlp
      summary: 获取设备 SLP 信息（仅 NET）
      description: |-
        向指定 IPv4/IPv6 地址查询设备的 SLP 原始属性信息。此接口为阻塞式调用，成功时立即返回，否则等待超时。

        **限制：**
        - 仅支持 NET（IPv4/IPv6），不支持 USB。
        - 若设备已关闭 SLP，接口必然超时失败。

        `job_target.model_name` 可传空字符串 `""` 跳过型号校验；若传入非空字符串，当实际型号不符时响应 `error_model_name_mismatch`。
      parameters:
        - name: Connection
          in: header
          required: true
          description: 建议传 close，便于移动端调试时快速关闭连接。
          schema:
            type: string
            examples:
              - close
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceSlpRequest"
            example:
              job_target:
                model_name: ""
                io: "ipv4://192.168.1.100"
              job_setting:
                duration: 10
                interval: 2
      responses:
        "200":
          description: 成功返回 SLP 信息。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceSlpResponse"
              example:
                result: success
                model_name: "M7300FDW Series"
                host_name: "Pantum-M7300FDW"
                slp_attribute_list:
                  printer_name: Pantum-M7300FDW
                  x_mac_addr: "00:11:22:33:44:55"
                  sn: PTM123456789
        default:
          description: 未预期错误。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                message: unexpected error
  /device/sleep_time:
    post:
      operationId: setDeviceSleepTime
      summary: 设置设备休眠时间（仅 USB）
      description: |-
        设置指定 USB 设备的休眠时间。

        **限制：** 仅支持 USB，不支持 NET。
      parameters:
        - name: Connection
          in: header
          required: true
          description: 建议传 close，便于移动端调试时快速关闭连接。
          schema:
            type: string
            examples:
              - close
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceSleepTimeRequest"
            example:
              job_target:
                model_name: "M7300FDW Series"
                io: "usb_sn://CP7J000193"
              job_setting:
                timeout: 20
                sleep_time: 15
      responses:
        "200":
          description: 成功返回操作结果。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceSleepTimeResponse"
              example:
                result: success
        default:
          description: 未预期错误。
