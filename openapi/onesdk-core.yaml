          type: string
          format: date-time
        completed:
          type: string
          format: date-time
        canceled:
          type: string
          format: date-time
        failed:
          type: string
          format: date-time
    NetSearchRequest:
      type: object
      required:
        - job_setting
      properties:
        job_setting:
          $ref: "#/components/schemas/NetSearchJobSetting"
    NetSearchJobSetting:
      type: object
      required:
        - duration
        - interval
      properties:
        duration:
          type: integer
          description: |-
            搜索时长，单位秒。
            当值为 `0` 时表示持续搜索，不自动停止；当值为 `1` 到 `60` 时表示指定秒数后自动停止。
          default: 10
          minimum: 0
          maximum: 60
        interval:
          type: integer
          description: 发包间隔，单位秒。
          default: 2
          minimum: 1
          maximum: 60
    NetDevice:
      type: object
