                message: unexpected error
components:
  schemas:
    PrintResultResponse:
      type: object
      required:
        - result
        - print_result
      additionalProperties: false
      properties:
        result:
          type: string
          enum:
            - success
            - error_others
            - error_timeout
            - error_unsupported
            - error_unsupported_firmware
            - error_device_not_found
            - error_model_name_mismatch
            - error_connection_interrupt
        print_result:
          type: object
          description: 当 result == success 时返回，否则为 null。
          required:
            - copies
            - print_pages
            - total_pages
          properties:
            copies:
              type: integer
              description: 打印作业份数。
            print_pages:
              type: integer
              description: 实际打印页数。
            total_pages:
              type: integer
              description: 打印作业总页数。
    PrintJobTarget:
      type: object
      required:
        - model_name
        - io
      additionalProperties: false
      properties:
        model_name:
          type: string
          description: |-
            属性来源：`GET /devices/supported`、`GET /devices/net`、`GET /devices/usb`
        io:
          type: string
          description: |-
            NET 示例：
            - IPv4：`ipv4://192.168.223.1`
            - IPv6：`ipv6://fe80::aec5:1bff:fe58:9b5a%en0`

            USB 示例：
            - USB 序列号：`usb_sn://CP7J000193`
            - USB 文件描述符（Android）：`usb_fd://15`

            文件路径示例：
            - `file:///tmp/out.prn`（生成打印 PRN 文件）
            - `file:///` 包含三个 `/`，前两个构成前缀 `file://`，最后一个 `/` 表示绝对路径根目录
            - 注意：若应用对指定路径无读写权限，会直接报错；若文件已存在，也会直接报错，不会覆盖写入（出于安全考虑）
    PrintJobSetting:
      type: object
      required:
        - collate
        - sides
        - media_source
        - color_mode
        - media_size
        - media_type
        - copies
        - density
        - crop_by_margin
        - document_name
      description: 请参照 `GET /devices/supported` 中的 `print_capability`，不同型号能力不同。
      properties:
        collate:
          type: boolean
          description: 是否逐份。
        copies:
          type: integer
          minimum: 1
          maximum: 100
          default: 1
          description: 打印份数。
        density:
          type: string
        media_size:
          type: string
        media_type:
          type: string
        color_mode:
          type: string
        media_source:
          type: string
        sides:
          type: string
        crop_by_margin:
          type: boolean
          default: false
          description: |-
            是否根据 margin 裁剪。
            对下列系列无效：e_model_series_inkjet_6104、e_model_series_inkjet_6108。
        document_name:
          type: string
          description: 文档名，可传空字符串 ""。
        quality:
          type: string
          description: |-
            【引入版本】0.0.13
            - 若指定型号 print_capability.quality 返回 []，禁止设置此字段，否则创建作业失败。
            - 若返回 [draft, normal, high]，必须设置此字段，否则创建作业失败。
        compression:
          type: integer
          enum:
            - 0
            - 1
          default: 0
          description: |-
            压缩模式。来源 `GET /devices/net` 或 `GET /devices/usb`。
            - 0：默认
            - 1：压缩模式 1
    PrintJobCreateRequest:
      type: object
      required:
        - job_setting
        - job_target
      properties:
        job_target:
          $ref: "#/components/schemas/PrintJobTarget"
        job_setting:
          $ref: "#/components/schemas/PrintJobSetting"
    PrintJobCreateResponse:
      type: object
      required:
        - job_id
      additionalProperties: false
      properties:
        job_id:
          type: string
          description: 新建打印作业的 ID。
    PrintMargin:
      type: object
      required:
        - top
        - bottom
        - left
        - right
      description: |-
        【引入版本】0.0.31。填充模式：aspect fit。
        如不传入此对象，各项属性按默认值生效。
        须满足 media_size 物理高度 > top + bottom，物理宽度 > left + right。
      properties:
        top:
          type: integer
          minimum: 0
          default: 0
          description: "单位：µm（1000µm == 1mm）"
        bottom:
          type: integer
          minimum: 0
          default: 0
          description: "单位：µm（1000µm == 1mm）"
        left:
          type: integer
          minimum: 0
          default: 0
          description: "单位：µm（1000µm == 1mm）"
        right:
          type: integer
          minimum: 0
          default: 0
          description: "单位：µm（1000µm == 1mm）"
        color:
          type: string
          default: "0xFFFFFF"
          description: "边距填充颜色，格式：0xRRGGBB。"
    PrintJobPatchRequest:
      type: object
      required:
        - job_input
      additionalProperties: false
      properties:
        job_input:
          type: object
          description: 每个打印作业只支持单一类型，`pdf` 和 `image` 只能存在一个。
          properties:
            image:
              type: array
              description: |-
                支持边打印边传入文件，传入空数组 `[]` 表示结束传入文件。
                注意：e_model_series_inkjet_6108 只有在传入空数组后才会开始打印。
                支持格式：BMP、JPEG、PNG。
              items:
                type: object
                required:
                  - path
                  - rotation
                properties:
                  path:
                    type: string
                    description: 页面路径。
                  rotation:
                    type: integer
                    enum: [0, 90, 180, 270]
                    description: 页面旋转角度（顺时针）。
                  scale_mode:
                    type: string
                    enum:
                      - aspect_fit
                      - aspect_fill
                    description: |-
                      【引入版本】0.0.51
                      - aspect_fit：自适应
                      - aspect_fill：拉伸铺满
                  margin:
                    $ref: "#/components/schemas/PrintMargin"
            pdf:
              type: object
              required:
                - path
                - pages
                - password
              additionalProperties: false
              description: PDF 文件打印参数。
              properties:
                path:
                  type: string
                  description: 文件路径。
                password:
                  type: string
                  description: 文件密码，无密码传空字符串 ""。
                pages:
                  type: array
                  description: 选择打印页面，选择全部时传空数组 `[]`（此时不支持旋转）。
                  items:
                    type: object
                    required:
                      - index
                      - rotation
                    additionalProperties: false
                    properties:
                      index:
                        type: integer
                        description: |-
                          页面下标，取值范围 [1, page_count]。
                          page_count 来源于 `POST /pdf/preview` 接口。
                      rotation:
                        type: integer
                        enum: [0, 90, 180, 270]
                        description: 页面旋转角度（顺时针）。
                      scale_mode:
                        type: string
                        enum:
                          - aspect_fit
                          - aspect_fill
                        description: |-
                          【引入版本】0.0.51
                          - aspect_fit：自适应
                          - aspect_fill：拉伸铺满
                      margin:
                        $ref: "#/components/schemas/PrintMargin"
    PrintJobsResponse:
      type: object
      required:
        - job_ids
        - cache_directory
      additionalProperties: false
      properties:
        job_ids:
          type: array
          items:
            type: string
          description: 打印作业 ID 列表。
        cache_directory:
          type: string
          description: |-
            缓存目录：{working_directory}/modules/print/

            SDK 正常结束时，会删除此目录，避免缓存数据残留。
    ServiceInfoResponse:
      type: object
      required:
        - meta
        - modules
      properties:
        meta:
          type: object
          required:
            - name
            - version
            - build_time
            - mode
            - git_branch
            - git_commit_hash
            - git_commit_time
            - git_status_clean
            - system
            - system_version_min
            - architecture
            - macro
          properties:
            name:
              type: string
              description: 库名。
              const: onesdk
            version:
              type: string
              description: |-
                版本号，遵循 MAJOR.MINOR.PATCH 语义化版本控制规则。
                MAJOR（主版本号）：进行了不兼容的 API 更改时增加。
                MINOR（次版本号）：进行了向下兼容的功能性新增时增加。
                PATCH（补丁版本号）：进行了向下兼容的问题修正时增加。
            build_time:
              type: string
              format: date-time
              description: 编译时间。
            git_branch:
              type: string
              description: git 分支。
            git_commit_hash:
              type: string
              description: git 提交哈希值。
            git_commit_time:
              type: string
              format: date-time
              description: git 提交时间。
            mode:
              type: string
              description: 版本模式。
              enum:
                - debug
                - release
            git_status_clean:
              type: boolean
              description: git 状态是否干净。
            system:
              type: string
              description: 操作系统。
            system_version_min:
              type: string
              description: 操作系统最低支持版本。
            architecture:
              type: string
              description: CPU 架构。
            macro:
              type: string
              description: 宏名。
        modules:
          type: object
          required:
            - core
            - devices
          properties:
            core:
              type: array
              description: 核心模块列表。
              items:
                type: string
            devices:
              type: array
              description: 设备模块列表。
              items:
                type: string
            device:
              type: array
              description: 单设备模块列表。
              items:
                type: string
            scan:
              type: array
              description: 扫描模块列表。
              items:
                type: string
            fax:
              type: array
              description: 传真模块列表。
              items:
                type: string
            print:
              type: array
              description: 打印模块列表。
              items:
                type: string
            pdf:
              type: array
              description: PDF 模块列表。
              items:
                type: string
    SupportedDevicesResponse:
