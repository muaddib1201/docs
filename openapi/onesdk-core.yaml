    PdfPreviewMargin:
      type: object
      required:
        - top
        - bottom
        - left
        - right
      description: |-
        【引入版本】0.0.21。填充模式：aspect fit。
        如不传入此对象，各项属性按默认值生效。
        须满足：height > top + bottom，width > left + right。
      properties:
        top:
          type: integer
          minimum: 0
          default: 0
          description: "单位：pixel。"
        bottom:
          type: integer
          minimum: 0
          default: 0
          description: "单位：pixel。"
        left:
          type: integer
          minimum: 0
          default: 0
          description: "单位：pixel。"
        right:
          type: integer
          minimum: 0
          default: 0
          description: "单位：pixel。"
        color:
          type: string
          default: "0xFFFFFF"
          description: "【引入版本】0.0.29。边距填充颜色，格式：0xRRGGBB。"
    PdfPreviewPageBmpRequest:
      type: object
      required:
        - width
        - height
      properties:
        width:
          type: integer
          minimum: 1
          maximum: 65535
          description: 输出图像宽度（pixel），填充模式：aspect fit。
        height:
          type: integer
          minimum: 1
          maximum: 65535
          description: 输出图像高度（pixel），填充模式：aspect fit。
        scale_mode:
          type: string
          enum:
            - aspect_fit
            - aspect_fill
          description: |-
            【引入版本】0.0.51。缩放模式：
            - `aspect_fit`：自适应
            - `aspect_fill`：拉伸铺满
        margin:
          $ref: "#/components/schemas/PdfPreviewMargin"
    PdfPreviewPageRawRequest:
      type: object
      required:
        - width
