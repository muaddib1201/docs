        - mode
      properties:
        width:
          type: integer
          minimum: 1
          maximum: 65535
          description: 输出图像宽度（pixel），填充模式：aspect fit。
        height:
          type: integer
          minimum: 1
          maximum: 65535
          description: 输出图像高度（pixel），填充模式：aspect fit。
        mode:
          type: string
          description: 像素数据排列模式。
          enum:
