          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanJobResponse"
              example:
                job_id: "scan-job-001"
                job_info:
                  status: completed
                  status_timestamp:
                    created: "2025-01-01T00:00:00Z"
                    processing: "2025-01-01T00:00:01Z"
                    completed: "2025-01-01T00:00:10Z"
                    canceled: ""
                    failed: ""
                  result: success
                job_target:
                  model_name: "M7300FDW Series"
                  io: "ipv4://192.168.1.100"
                job_setting:
                  source: fb
                  color_mode: grayscale
                  resolution: "300"
                  media_size: "A4 (210x297mm)"
                job_progress:
                  index: 1
                  progress: 100
                files:
