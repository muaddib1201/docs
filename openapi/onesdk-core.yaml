        "Statement (5.5x8.5in)":
          type: integer
          description: Statement / Invoice / Mini / Half-Letter
        "Executive (7.25x10.5in)": { type: integer }
        "Letter (8.5x11in)": { type: integer }
        "Folio (8.5x13in)": { type: integer }
        "Oficio (8.5x13.4in)": { type: integer }
        "Legal (8.5x14in)": { type: integer }
        "4x6 (4x6in)":
          type: integer
          description: 【引入版本】0.0.11
        "5x7 (5x7in)":
          type: integer
          description: 【引入版本】0.0.11
        "8x10 (8x10in)":
          type: integer
          description: 【引入版本】0.0.11
        "11x17 (11x17in)":
          type: integer
          description: Tabloid / Ledger / 11x17
        "Custom":
          type: integer
          description: 自定义纸张。
        "Other":
          type: integer
          description: 其他纸张。
        "A4 (210x297mm)/Letter (8.5x11in)": { type: integer }
        "ISO B5 (176x250mm)/JIS B5 (182x257mm)/Executive (7.25x10.5in)": { type: integer }
        "Legal (8.5x14in)/Folio (8.5x13in)": { type: integer }
    DeviceStatusDynamic:
      type: object
      required:
        - supply
        - status
        - media_source
        - sleep_time
        - page_count_summary
        - page_count_media_size
      nullable: true
      description: 当 `result == success` 时返回设备动态信息，否则为 null。
      properties:
        sleep_time:
          type: integer
          minimum: 0
          description: 当前休眠时间设置（分钟）。
        gbt:
          type: integer
          description: |-
            GBT 固件标识。`0` 表示非 GBT 固件，`1` 表示 GBT 固件。
            目前仅支持 6138v2r1 及 2242xc 机型。
          enum:
            - 0
            - 1
        status:
          type: array
          description: 设备当前状态列表。各系列可能发生的状态可通过 `GET /device/status.csv` 获取。
          items:
            $ref: "#/components/schemas/DeviceStatusItem"
        supply:
          $ref: "#/components/schemas/DeviceStatusSupply"
        media_source:
          $ref: "#/components/schemas/DeviceStatusMediaSource"
        page_count_summary:
          $ref: "#/components/schemas/DeviceStatusPageCountSummary"
        page_count_media_size:
          $ref: "#/components/schemas/DeviceStatusPageCountMediaSize"
    DeviceStatusResponse:
      type: object
      required:
        - result
        - static
        - dynamic
      properties:
        result:
          type: string
          description: |-
            操作结果：
            - `success`：成功
            - `error_others`：其他错误
            - `error_unsupported`：不支持
            - `error_device_not_found`：设备未找到
            - `error_timeout`：I/O 超时
            - `error_connection_interrupt`：连接中断
            - `error_model_name_mismatch`：型号名称不匹配
            - `error_device_setting_closed`：设备设置关闭
          enum:
            - success
            - error_others
            - error_unsupported
            - error_device_not_found
            - error_timeout
            - error_connection_interrupt
            - error_model_name_mismatch
            - error_device_setting_closed
        static:
          $ref: "#/components/schemas/DeviceStatusStatic"
        dynamic:
          $ref: "#/components/schemas/DeviceStatusDynamic"
    DeviceSlpRequest:
      type: object
      required:
        - job_target
        - job_setting
      properties:
        job_target:
          $ref: "#/components/schemas/ScanJobTarget"
          description: |-
            `model_name` 可传空字符串 `""` 跳过型号校验；若传入非空字符串，当实际型号不符时响应 `error_model_name_mismatch`。
            `io` 仅支持 IPv4 和 IPv6，不支持 USB。
        job_setting:
          $ref: "#/components/schemas/DeviceQueryJobSetting"
    DeviceSlpResponse:
      type: object
      required:
        - result
        - model_name
        - host_name
        - slp_attribute_list
      additionalProperties: false
      properties:
        result:
          type: string
          description: |-
            操作结果：
            - `success`：成功
            - `error_timeout`：超时
            - `error_model_name_mismatch`：型号名称不匹配
            - `error_others`：其他错误
          enum:
            - success
            - error_timeout
            - error_model_name_mismatch
            - error_others
        model_name:
          type: string
          description: 当 `result == success` 时为设备实际型号名称；其他情况固定为 `""`。
        host_name:
          type: string
          description: 设备主机名。
        slp_attribute_list:
          $ref: "#/components/schemas/SlpAttributeList"
          description: SLP 原始属性映射（key 中 `-` 已替换为 `_`）；失败时为 null。
    DeviceSleepTimeRequest:
      type: object
      required:
        - job_target
        - job_setting
      properties:
        job_target:
          $ref: "#/components/schemas/ScanJobTarget"
          description: "`io` 仅支持 USB，不支持 NET。"
        job_setting:
          type: object
          required:
            - timeout
            - sleep_time
          additionalProperties: false
          properties:
            timeout:
              type: integer
              minimum: 20
              maximum: 60
              description: |-
                HTTP 请求超时时间（秒），包含连接超时、读超时、写超时。
                注意：当发生错误（如目标拒绝连接）时，会立即返回。
            sleep_time:
              type: integer
              description: |-
                要设置的休眠时间（分钟）。
                可选值：`1`、`5`、`15`、`30`、`60`。
              enum:
                - 1
                - 5
                - 15
                - 30
                - 60
    DeviceSleepTimeResponse:
      type: object
      required:
        - result
      properties:
        result:
          type: string
          description: |-
            操作结果：
            - `success`：成功
            - `error_others`：其他错误
            - `error_connection_failed`：连接失败
            - `error_timeout`：超时
            - `error_command_failed`：命令执行失败
          enum:
            - success
            - error_others
            - error_connection_failed
            - error_timeout
            - error_command_failed
    ScanJobsResponse:
      type: object
      required:
        - job_ids
        - cache_directory
      additionalProperties: false
      properties:
        job_ids:
          type: array
          items:
            type: string
          description: 扫描作业 ID 列表。
        cache_directory:
          type: string
          description: |-
            缓存目录：{working_directory}/modules/scan/

            SDK 正常结束时，会删除此目录，避免缓存数据残留。
    ScanJobTarget:
      type: object
      required:
        - model_name
        - io
      additionalProperties: false
      properties:
        model_name:
          type: string
          description: |-
            属性来源：`GET /devices/supported`、`GET /devices/net`、`GET /devices/usb`
        io:
          type: string
          description: |-
            NET 示例：
            - IPv4：`ipv4://192.168.223.1`
            - IPv6：`ipv6://fe80::aec5:1bff:fe58:9b5a%en0`
            - IPv4、IPv6 地址来源：`GET /devices/net`

            USB 示例：
            - USB 序列号：`usb_sn://CP7J000193`
            - USB 文件描述符（Android）：`usb_fd://15`
            - USB 序列号来源：`GET /devices/usb`
            - USB 文件描述符来源（Android）：
              ```
              UsbDeviceConnection con = UsbManager.openDevice();
              int fd = con.getFileDescriptor();
              String io = "usb_fd://" + String.valueOf(fd);
              ```
    ScanJobSetting:
      type: object
      required:
        - source
        - color_mode
        - resolution
        - media_size
      description: 请参照 `GET /devices/supported` 中的 `scan_capability`，不同型号能力不同。
      properties:
        source:
          type: string
          description: 扫描来源，如 `fb`（稿台）、`adf`（自动进纸器）等。
        color_mode:
          type: string
          description: 色彩模式，如 `grayscale`、`color` 等。
        resolution:
          type: string
          description: 分辨率，如 `"300"`。
        media_size:
          type: string
          description: 纸张尺寸，如 `"A4 (210x297mm)"`。
    ScanJobCreateRequest:
      type: object
      required:
        - job_setting
        - job_target
      properties:
        job_target:
          $ref: "#/components/schemas/ScanJobTarget"
        job_setting:
          $ref: "#/components/schemas/ScanJobSetting"
    ScanJobCreateResponse:
      type: object
      required:
        - job_id
      additionalProperties: false
      properties:
        job_id:
          type: string
          description: 新建扫描作业的 ID。
    ScanJobInfo:
      type: object
      required:
        - status
        - status_timestamp
        - result
      additionalProperties: false
      properties:
        status:
          type: string
          description: 作业当前状态。
          enum:
            - created
            - processing
            - completed
            - canceled
            - failed
        status_timestamp:
          $ref: "#/components/schemas/JobStatusTimestamp"
        result:
          type: string
          description: |-
            作业结果：
            - `success`：成功
            - `cancel_from_host`：由主机取消
            - `cancel_from_device`：由设备取消
            - `error_others`：其他错误
            - `error_timeout`：超时
            - `error_connection_failed`：连接失败
            - `error_connection_interrupt`：连接中断
            - `error_device_busy`：设备忙
            - `error_filesystem`：文件系统错误
            - `error_adf_jam`：自动进纸器卡纸
            - `error_adf_cover_open`：自动进纸器上盖打开
            - `error_adf_no_paper_present`：自动进纸器缺纸
            - `error_fb_cover_open`：稿台上盖打开
            - `error_paper_size_not_support`：纸张尺寸不支持
            - `error_adf_pick_up_paper_fail`：自动进纸器取纸失败
            - `error_need_calibration`：需要校准
            - `error_disable`：功能已禁用
            - `error_fatal`：致命错误
          enum:
            - ""
            - success
            - cancel_from_host
            - cancel_from_device
            - error_others
            - error_timeout
            - error_connection_failed
            - error_connection_interrupt
            - error_device_busy
            - error_filesystem
            - error_adf_jam
            - error_adf_cover_open
            - error_adf_no_paper_present
            - error_fb_cover_open
            - error_paper_size_not_support
            - error_adf_pick_up_paper_fail
            - error_need_calibration
            - error_disable
            - error_fatal
    ScanJobProgress:
      type: object
      required:
        - index
        - progress
      additionalProperties: false
      properties:
        index:
          type: integer
          minimum: 1
          description: 当前扫描页面下标，取值范围 [1, page_count]。
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: 当前页面数据接收进度（0–100）。
    ScanJobResponse:
      type: object
      required:
        - job_id
        - job_info
        - job_target
        - job_setting
        - job_progress
        - files
      additionalProperties: false
      properties:
        job_id:
          type: string
          description: 扫描作业 ID。
        job_info:
          $ref: "#/components/schemas/ScanJobInfo"
        job_target:
          $ref: "#/components/schemas/ScanJobTarget"
        job_setting:
          $ref: "#/components/schemas/ScanJobSetting"
        job_progress:
          $ref: "#/components/schemas/ScanJobProgress"
        files:
          type: array
          items:
            type: string
          description: 已扫描的文件路径列表。
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
